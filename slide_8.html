<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #FFFFFF; color: #333333; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; /* keep as required */
            background-color: #FFFFFF;
            position: relative;
            overflow: hidden;
            padding: 80px 60px 24px; /* keep top padding 80px */
            display: flex;
            flex-direction: column;
        }
        .red-line {
            width: 120px;
            height: 8px;
            background-color: #E60012;
            margin-bottom: 24px; /* reduced */
        }
        .main-title {
            font-weight: 900;
            font-size: 48px;
            color: #1A1A1A;
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        .sub-title {
            font-weight: 900;
            font-size: 24px;
            color: #E60012;
            margin-bottom: 24px; /* reduced */
            line-height: 1.4;
        }
        /* Grid layout to reduce vertical length */
        .chat-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 24px; /* row-gap 16, col-gap 24 */
            background-color: #F5F5F5;
            padding: 16px; /* reduced padding */
            border-radius: 16px;
            align-items: start;
        }
        .chat-message {
            display: flex;
            gap: 12px;
            max-width: 100%;
            align-items: flex-start;
        }
        .chat-message.user { 
            justify-content: flex-end;
            flex-direction: row-reverse;
        }
        .chat-message.ai {
            justify-content: flex-start;
        }
        .chat-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .user .chat-icon {
            background-color: #1A1A1A;
            color: #FFFFFF;
        }
        .ai .chat-icon {
            background-color: #E60012;
            color: #FFFFFF;
        }
        .chat-bubble {
            padding: 12px 16px; /* reduced */
            border-radius: 16px;
            font-weight: 400;
            font-size: 20px; /* keep font size */
            line-height: 1.6;
            position: relative;
        }
        .user .chat-bubble {
            background-color: #1A1A1A;
            color: #FFFFFF;
            border-top-right-radius: 4px;
        }
        .ai .chat-bubble {
            background-color: #FFFFFF;
            color: #333333;
            border: 2px solid #E60012;
            border-top-left-radius: 4px;
        }
        .highlight {
            font-weight: 900;
            color: #E60012;
        }
        /* Ensure messages occupy correct columns */
        .col-left { grid-column: 1; }
        .col-right { grid-column: 2; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="red-line"></div>
        <h1 class="main-title">AIエージェントが、Daruma Expressの情報を経営資産に変える</h1>
        <h2 class="sub-title">「聞くだけ」で、5店舗分の情報が瞬時に引き出せる</h2>
        
        <div class="chat-container">
            <div class="chat-message user col-left">
                <div class="chat-icon"><i class="fas fa-user"></i></div>
                <div class="chat-bubble">
                    「先週、全店舗で一番多かったトラブル報告は何？」
                </div>
            </div>
            
            <div class="chat-message ai col-left">
                <div class="chat-icon"><i class="fas fa-robot"></i></div>
                <div class="chat-bubble">
                    先週は計12件。最も多かったのは<span class="highlight">エアコンの不調（4件）</span>で、A店とC店に集中しています。次はレジ釣り銭不足（3件）です。
                </div>
            </div>
            
            <div class="chat-message user col-right">
                <div class="chat-icon"><i class="fas fa-user"></i></div>
                <div class="chat-bubble">
                    「ミャンマー人スタッフから上がっている改善提案をまとめて"
                </div>
            </div>
            
            <div class="chat-message ai col-right">
                <div class="chat-icon"><i class="fas fa-robot"></i></div>
                <div class="chat-bubble">
                    今月の改善提案（計3件）を要約します：1) 写真付きマニュアルの作成（B店）、2) 大きめのゴミ箱設置（A店）、3) 週末のレジ増員（C店）。
                </div>
            </div>
        </div>
    </div>
</body>
</html>
