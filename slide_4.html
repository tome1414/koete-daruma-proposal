<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #FFFFFF; color: #333333; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background-color: #FFFFFF;
            position: relative;
            overflow: hidden;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
        }
        .red-line {
            width: 120px;
            height: 8px;
            background-color: #E60012;
            margin-bottom: 40px;
        }
        .main-title {
            font-weight: 900;
            font-size: 48px;
            color: #1A1A1A;
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        .sub-title {
            font-weight: 900;
            font-size: 24px;
            color: #E60012;
            margin-bottom: 60px;
            line-height: 1.4;
        }
        .features-container {
            display: flex;
            gap: 40px;
            flex-grow: 1;
        }
        .feature-block {
            flex: 1;
            background-color: #F5F5F5;
            border-top: 8px solid #E60012;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
        }
        .feature-no {
            font-weight: 900;
            font-size: 48px;
            color: #E60012;
            margin-bottom: 16px;
            line-height: 1;
        }
        .feature-title {
            font-weight: 900;
            font-size: 28px;
            color: #1A1A1A;
            margin-bottom: 24px;
            line-height: 1.3;
        }
        .feature-desc {
            font-weight: 400;
            font-size: 18px;
            color: #666666;
            line-height: 1.8;
        }
        .feature-icon {
            font-size: 48px;
            color: #1A1A1A;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="red-line"></div>
        <h1 class="main-title">KOETEとは？</h1>
        <h2 class="sub-title">KOETEは「多国籍チームの報連相」を仕組みで解決するコミュニケーションプラットフォーム</h2>
        
        <div class="features-container">
            <div class="feature-block">
                <div class="feature-icon"><i class="fas fa-layer-group"></i></div>
                <div class="feature-no">01</div>
                <div class="feature-title">スレッド構造</div>
                <div class="feature-desc">一つの問題に一つのスレッド。話題が埋もれず、対応状況が見え、文脈が残る。LINEのように流れない。</div>
            </div>
            <div class="feature-block">
                <div class="feature-icon"><i class="fas fa-language"></i></div>
                <div class="feature-no">02</div>
                <div class="feature-title">AI翻訳（9言語対応）</div>
                <div class="feature-desc">日本語・タイ語・ミャンマー語・ベトナム語・英語・中国語・インドネシア語・ネパール語・ウズベク語。母国語のまま報連相。コピペ不要、双方向自動翻訳。</div>
            </div>
            <div class="feature-block">
                <div class="feature-icon"><i class="fas fa-robot"></i></div>
                <div class="feature-no">03</div>
                <div class="feature-title">AIエージェント</div>
                <div class="feature-desc">蓄積されたあらゆるデータをAIが横断分析。「今月の売上トップ商品は？」「ミャンマーチームで最近上がっている話題は？」——対話で即座に引き出せる。</div>
            </div>
        </div>
    </div>
</body>
</html>
